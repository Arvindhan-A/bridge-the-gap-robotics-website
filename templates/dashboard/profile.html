{% extends "base.html" %}
{% block title %}Profile | Dashboard{% endblock %}
{% block content %}
<div class="form-page" style="max-width:480px;">
    <a href="{{ url_for('dashboard.overview') }}" class="back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15,18 9,12 15,6"/></svg>
        Back to Dashboard
    </a>
    <h1>My Profile</h1>
    <p style="color:var(--text-3);font-size:0.875rem;margin-bottom:2rem;">Update your name, email, or password.</p>

    <form method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ user.name }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}" required>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" value="{{ user.username or '' }}" required>
        </div>
        <div class="form-group">
            <label>New Password <span style="font-weight:400;color:var(--text-3);">(leave blank to keep current)</span></label>
            <input type="password" name="password" placeholder="••••••••">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for('dashboard.overview') }}" class="btn-outline">Cancel</a>
        </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
</div>
{% endblock %}
