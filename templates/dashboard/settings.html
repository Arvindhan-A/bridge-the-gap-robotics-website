{% extends "base.html" %}
{% block title %}Settings | {{ chapter.name }}{% endblock %}
{% block content %}
<div class="form-page" style="max-width:600px;">
    <a href="{{ url_for('dashboard.overview') }}" class="back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15,18 9,12 15,6"/></svg>
        Back to Dashboard
    </a>
    <h1>Contact &amp; Social Settings</h1>
    <form method="POST">
        <div class="form-group">
            <label>Contact Email</label>
            <input type="email" name="contact_email" value="{{ chapter.contact_email }}">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="contact_phone" value="{{ chapter.contact_phone }}">
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" value="{{ chapter.address }}">
        </div>
        <div class="form-group">
            <label>Google Maps Embed URL</label>
            <input type="url" name="google_maps" value="{{ chapter.google_maps }}" placeholder="https://www.google.com/maps/embed?pb=...">
        </div>
        <div class="form-group">
            <label>Latitude (for map pin)</label>
            <input type="number" step="any" name="latitude" value="{{ chapter.latitude or '' }}">
        </div>
        <div class="form-group">
            <label>Longitude (for map pin)</label>
            <input type="number" step="any" name="longitude" value="{{ chapter.longitude or '' }}">
        </div>
        <div class="form-group">
            <label>Instagram URL</label>
            <input type="url" name="instagram" value="{{ chapter.instagram }}">
        </div>
        <div class="form-group">
            <label>LinkedIn URL</label>
            <input type="url" name="linkedin" value="{{ chapter.linkedin }}">
        </div>
        <div class="form-group">
            <label>Discord URL</label>
            <input type="url" name="discord" value="{{ chapter.discord }}">
        </div>
        <div class="form-group">
            <label>Website</label>
            <input type="url" name="website" value="{{ chapter.website }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn">Save Settings</button>
            <a href="{{ url_for('dashboard.overview') }}" class="btn-outline">Cancel</a>
        </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    </form>
</div>
{% endblock %}
