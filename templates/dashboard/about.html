{% extends "base.html" %}
{% block title %}Edit About | {{ chapter.name }}{% endblock %}
{% block content %}
<div class="form-page" style="max-width:700px;">
    <a href="{{ url_for('dashboard.overview') }}" class="back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15,18 9,12 15,6"/></svg>
        Back to Dashboard
    </a>
    <h1>Edit Chapter Info</h1>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Chapter Name</label>
            <input type="text" name="name" value="{{ chapter.name }}" required>
        </div>
        <div class="form-group">
            <label>City</label>
            <input type="text" name="city" value="{{ chapter.city }}" required>
        </div>
        <div class="form-group">
            <label>Short Description</label>
            <textarea name="description" rows="3" placeholder="Brief description shown on chapter cards">{{ chapter.description }}</textarea>
        </div>
        <div class="form-group">
            <label>About</label>
            <textarea name="about" rows="8" placeholder="Full description of your chapter">{{ chapter.about }}</textarea>
        </div>
        <div class="form-group">
            <label>Mission</label>
            <textarea name="mission" rows="4" placeholder="What is your chapter's mission?">{{ chapter.mission }}</textarea>
        </div>
        <div class="form-group">
            <label>Vision</label>
            <textarea name="vision" rows="4" placeholder="What is your chapter's vision?">{{ chapter.vision }}</textarea>
        </div>
        <div class="form-group">
            <label>Objectives</label>
            <textarea name="objectives" rows="4" placeholder="Key objectives and goals">{{ chapter.objectives }}</textarea>
        </div>

        <h2 style="font-family:'Google Sans',sans-serif;font-size:1.125rem;font-weight:400;margin:2rem 0 1rem;">Images</h2>
        <div class="form-group">
            <label>Cover Image</label>
            <input type="file" name="cover_image" accept="image/*">
            {% if chapter.cover_image %}
            <div style="margin-top:0.5rem;">
                <img src="{{ url_for('static', filename=chapter.cover_image) }}" style="max-width:200px;border-radius:var(--r-sm);border:1px solid var(--border);">
            </div>
            {% endif %}
        </div>
        <div class="form-group">
            <label>Chapter Logo</label>
            <input type="file" name="logo" accept="image/*">
            {% if chapter.logo %}
            <div style="margin-top:0.5rem;">
                <img src="{{ url_for('static', filename=chapter.logo) }}" style="max-width:100px;border-radius:var(--r-sm);border:1px solid var(--border);">
            </div>
            {% endif %}
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for('dashboard.overview') }}" class="btn-outline">Cancel</a>
        </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    </form>
</div>
{% endblock %}
