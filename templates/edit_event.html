{% extends "base.html" %}
{% block title %}Edit Event - Admin{% endblock %}
{% block content %}
<div class="form-page">
    <h1>Edit Event</h1>
    <form method="POST">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ event.title }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" required>{{ event.description }}</textarea>
        </div>
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" value="{{ event.date }}" required>
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" value="{{ event.location }}">
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="upcoming"{% if event.status == 'upcoming' %} selected{% endif %}>Upcoming</option>
                <option value="past"{% if event.status == 'past' %} selected{% endif %}>Past</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-accent">Save Changes</button>
            <a href="/events" class="btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
